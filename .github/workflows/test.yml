name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:ci
        env:
          # These are intentionally fake placeholder values used only for unit tests.
          # All external calls (GitHub, Cortex) are mocked via vi.mock() in test files.
          # Real secrets are never used in unit tests.
          GITHUB_TOKEN: test_token
          BLOG_REPO_OWNER: test-owner
          BLOG_REPO_NAME: test-repo
          BLOG_CONTENT_PATH: content/posts
          CORTEX_API_KEY: test_key
          CORTEX_BASE_URL: https://cortex.test
          NEXT_PUBLIC_CONVEX_URL: https://convex.test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    env:
      # Current Playwright coverage only exercises unauthenticated smoke paths,
      # so placeholder values are sufficient to boot the production app in CI.
      NEXT_PUBLIC_CONVEX_URL: https://convex.test
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuYWNjb3VudHMuZGV2JA==
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_JWT_ISSUER_DOMAIN: https://clerk.test
      CORTEX_API_KEY: test_key
      GITHUB_TOKEN: test_token
      BLOG_REPO_OWNER: test-owner
      BLOG_REPO_NAME: test-repo
      BLOG_CONTENT_PATH: content/posts
      E2E_BYPASS_AUTH: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run Playwright E2E
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
